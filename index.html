<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glacier Studio</title>
    <style>
        /* 核心视觉设定：极简、留白、高品质排版 */
        :root {
            --bg-color: #fcfcfc;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #2c2c2c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            /* 增加微妙的背景纹理感，拒绝生硬的纯白 */
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* 头部：去除冗余，直击主题 */
        header {
            margin-bottom: 80px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* 游戏展示网格：克制、干净的卡片设计 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin-bottom: 80px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.04);
            border-color: #d1d1d1;
        }

        .icon-placeholder {
            width: 64px;
            height: 64px;
            background: #f5f5f5;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid #eaeaea;
        }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* 底部合规链接：合规且不抢视觉焦点 */
        footer {
            border-top: 1px solid #eaeaea;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        .contact {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Glacier Studio</h1>
            <p class="subtitle">Creating focused, high-quality digital experiences.</p>
        </header>

        <div class="grid">
            <a href="你的 Google Play 链接" target="_blank" class="card">
                <div class="icon-placeholder">🌸</div>
                <h3>Blossom Go!</h3>
                <p>A relaxing floral puzzle experience.</p>
            </a>

            <a href="你的 Google Play 链接" target="_blank" class="card">
                <div class="icon-placeholder">🃏</div>
                <h3>Solitaire</h3>
                <p>Classic gameplay, minimalist design.</p>
            </a>
        </div>

        <footer>
            <div class="footer-links">
                <a href="/privacy-policy.html">Privacy Policy</a>
                <a href="/terms-of-service.html">Terms of Service</a>
            </div>
            <div class="contact">
                Contact: glacier2023studio@gmail.com
            </div>
        </footer>
    </div>

</body>
</html>
